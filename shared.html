<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MoneyTracker | Shared Expenses</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <aside class="sidebar">
        <div class="sidebar-logo">MoneyTracker</div>
        
        <div class="user-profile">
            shashwat
        </div>

        <ul class="nav-menu">
            <li class="nav-item">
                <a href="index.html" class="nav-link">Dashboard</a>
            </li>
            <li class="nav-item">
                <a href="transactions.html" class="nav-link">Transactions</a>
            </li>
            <li class="nav-item">
                <a href="categories.html" class="nav-link">Category Totals</a>
            </li>
            <li class="nav-item">
                <a href="shared.html" class="nav-link active">Shared Expenses</a>
            </li>
            <li class="nav-item">
                <a href="networth.html" class="nav-link">Networth</a>
            </li>
            <li class="nav-item">
                <a href="settings.html" class="nav-link">Settings</a>
            </li>
        </ul>

        <div class="sidebar-footer">
            <p>Need another profile?</p>
            <button class="btn-switch">Switch User</button>
        </div>
    </aside>

    <main class="main-content">
        <div class="dashboard-grid">
            <div class="stat-card" style="text-align: left;">
                <div class="stat-label">Net Shared Position</div>
                <div id="net-shared-position" class="stat-value positive" style="font-size: 3.5rem;">+₹0.00</div>
                <div class="stat-sub-details" style="font-size: 0.9rem;">Overall balance across all participants</div>
            </div>
            <div class="stat-card" style="text-align: left;">
                <div class="stat-label">Filter by Person</div>
                <input type="text" id="person-filter" class="form-input" placeholder="Type a person's name..." style="margin: 1rem 0;">
                <a href="#" id="clear-person-filter" class="see-all" style="display: block; text-align: center;">Clear Search</a>
            </div>
        </div>

        <h2 class="section-title">Participant Summaries</h2>
        
        <div class="participant-list" id="participant-list">
            <!-- Dynamic participant items -->
        </div>
    </main>

    <!-- Modal Overlay -->
    <div id="modal-overlay" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modal-title" class="modal-title">Action</h2>
                <span id="modal-close" class="modal-close">&times;</span>
            </div>
            <div id="modal-body" class="modal-body">
                <!-- Dynamic form content will be injected here -->
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
