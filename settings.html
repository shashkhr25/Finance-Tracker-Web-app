<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MoneyTracker | Settings</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <aside class="sidebar">
        <div class="sidebar-logo">MoneyTracker</div>
        
        <div class="user-profile">
            shashwat
        </div>

        <ul class="nav-menu">
            <li class="nav-item">
                <a href="index.html" class="nav-link">Dashboard</a>
            </li>
            <li class="nav-item">
                <a href="transactions.html" class="nav-link">Transactions</a>
            </li>
            <li class="nav-item">
                <a href="categories.html" class="nav-link">Category Totals</a>
            </li>
            <li class="nav-item">
                <a href="shared.html" class="nav-link">Shared Expenses</a>
            </li>
            <li class="nav-item">
                <a href="networth.html" class="nav-link">Networth</a>
            </li>
            <li class="nav-item">
                <a href="settings.html" class="nav-link active">Settings</a>
            </li>
        </ul>

        <div class="sidebar-footer">
            <p>Need another profile?</p>
            <button class="btn-switch">Switch User</button>
        </div>
    </aside>

    <main class="main-content">
        <div class="settings-section">
            <h2 class="settings-title">Financial Configuration</h2>
            <div class="form-group">
                <label>Cash Balance</label>
                <input type="text" id="config-cash" class="form-input" value="0.00">
            </div>
            <div class="form-group">
                <label>Accounts (Name: Balance)</label>
                <textarea id="config-accounts" class="form-textarea"></textarea>
            </div>
        </div>

        <div class="settings-section">
            <h2 class="settings-title">Transaction Options</h2>
            <div class="form-group">
                <label>Payment Devices</label>
                <textarea id="config-devices" class="form-textarea"></textarea>
            </div>
            <div class="form-group">
                <label>Income Sources</label>
                <textarea id="config-income" class="form-textarea"></textarea>
            </div>
            <div class="form-group">
                <label>Shared Participants</label>
                <textarea id="config-participants" class="form-textarea"></textarea>
            </div>
        </div>

        <div class="settings-section">
            <h2 class="settings-title">Data & Backup</h2>
            <div class="form-group">
                <div class="input-with-action">
                    <input type="text" class="form-input" placeholder="Export path">
                    <button class="btn-secondary">Browse</button>
                    <button class="btn-clear" style="border-radius: 8px;">Export CSV</button>
                </div>
            </div>
            <div class="form-group">
                <div class="input-with-action">
                    <input type="text" class="form-input" placeholder="Import path">
                    <button class="btn-secondary">Browse</button>
                    <button class="btn-success">Smart Import</button>
                </div>
            </div>
        </div>

        <div class="quick-actions" style="margin-top: 3rem;">
            <a href="#" class="qa-btn qa-basket" style="background-color: #f0f4ff; color: var(--color-blue);">Manage Categories</a>
            <a href="#" class="qa-btn qa-income" style="background-color: #e5f9e0; color: #27ae60;">Edit Initial Savings</a>
            <a href="#" class="qa-btn qa-expense" style="background-color: #fff9ed; color: #b07e2e;">Switch User</a>
            <button id="save-settings" class="qa-btn qa-income" style="background-color: #5bbd8c; color: white; border: none; cursor: pointer;">Save Settings</button>
        </div>
    </main>

    <!-- Modal Overlay -->
    <div id="modal-overlay" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modal-title" class="modal-title">Action</h2>
                <span id="modal-close" class="modal-close">&times;</span>
            </div>
            <div id="modal-body" class="modal-body">
                <!-- Dynamic form content will be injected here -->
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
