<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MoneyTracker | Category Totals</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <aside class="sidebar">
        <div class="sidebar-logo">MoneyTracker</div>
        
        <div class="user-profile">
            shashwat
        </div>

        <ul class="nav-menu">
            <li class="nav-item">
                <a href="index.html" class="nav-link">Dashboard</a>
            </li>
            <li class="nav-item">
                <a href="transactions.html" class="nav-link">Transactions</a>
            </li>
            <li class="nav-item">
                <a href="categories.html" class="nav-link active">Category Totals</a>
            </li>
            <li class="nav-item">
                <a href="shared.html" class="nav-link">Shared Expenses</a>
            </li>
            <li class="nav-item">
                <a href="networth.html" class="nav-link">Networth</a>
            </li>
            <li class="nav-item">
                <a href="settings.html" class="nav-link">Settings</a>
            </li>
        </ul>

        <div class="sidebar-footer">
            <p>Need another profile?</p>
            <button class="btn-switch">Switch User</button>
        </div>
    </aside>

    <main class="main-content">
        <div class="activity-header">
            <div class="tabs">
                <a href="#" class="tab active">Expenses</a>
                <a href="#" class="tab">Total Spending</a>
            </div>
            <div style="font-size: 1.5rem; font-weight: 800;">₹102,134.31</div>
        </div>

        <div class="filter-container">
            <div class="filter-row">
                <div class="filter-item" style="flex: 3;">
                    <input type="text" class="form-input" placeholder="Search categories...">
                </div>
                <div class="filter-item">
                    <select class="form-select">
                        <option>All</option>
                    </select>
                </div>
            </div>
            <div class="filter-row">
                <div class="filter-item">
                    <select class="form-select">
                        <option>May</option>
                    </select>
                </div>
                <div class="filter-item">
                    <input type="text" class="form-input" value="2026">
                </div>
                <div style="flex: 2;"></div>
                <button class="btn-clear">Clear</button>
            </div>
        </div>

        <div class="category-list" id="category-list">
            <!-- Dynamic content will be injected here -->
        </div>
    </main>

    <!-- Modal Overlay -->
    <div id="modal-overlay" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modal-title" class="modal-title">Action</h2>
                <span id="modal-close" class="modal-close">&times;</span>
            </div>
            <div id="modal-body" class="modal-body">
                <!-- Dynamic form content will be injected here -->
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
